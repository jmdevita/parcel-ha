add_parcel:
  fields:
    device_id:
      description: "The device to target."
      example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
      required: true
      selector:
        device:
          integration: parcelapp
    parcel_name:
      name: "Parcel Name"
      description: "Name/description for the parcel"
      example: "My Parcel"
      required: true
      selector:
        text:
    tracking_number:
      name: "Tracking Number"
      description: "Tracking number for the parcel"
      example: "1234567890"
      required: true
      selector:
        text:
    courier:
      name: "Courier"
      description: "Courier/carrier code (e.g., ups, fedex, usps)"
      example: "ups"
      required: true
      selector:
        text:
    language:
      name: "Language"
      description: "Language for delivery information (ISO 639-1 two-letter code). Availability depends on carrier."
      example: "en"
      required: false
      default: "en"
      selector:
        text:
    send_push_confirmation:
      name: "Send Push Notification"
      description: "Send a push notification when the parcel is added"
      required: false
      default: false
      selector:
        boolean:

delete_parcel:
  fields:
    device_id:
      description: "The device to target."
      example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
      required: true
      selector:
        device:
          integration: parcelapp
    tracking_number:
      example: "1234567890"
      required: true
      selector:
        text:
    type:
      example: "package"
      required: true
      selector:
        text:

edit_parcel:
  fields:
    device_id:
      description: "The device to target."
      example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
      required: true
      selector:
        device:
          integration: parcelapp
    parcel_name:
      name: "Parcel Name"
      description: "New name for the parcel"
      example: "Updated Parcel Name"
      required: true
      selector:
        text:
    tracking_number:
      name: "Tracking Number"
      description: "New tracking number"
      example: "1234567890"
      required: true
      selector:
        text:
    courier:
      name: "Courier"
      description: "New courier/carrier code"
      example: "fedex"
      required: true
      selector:
        text:
    oldNumber:
      name: "Old Tracking Number"
      description: "Current tracking number of the parcel to edit"
      example: "1234567890"
      required: true
      selector:
        text:
    oldType:
      name: "Old Courier"
      description: "Current courier/carrier code of the parcel to edit"
      example: "fedex"
      required: true
      selector:
        text: